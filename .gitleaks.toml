# gitleaks configuration for homeCFO
# Extends default ruleset with finance-specific patterns to prevent
# leaking real account numbers, balances, or PII into git history.

title = "homeCFO gitleaks rules"

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Finance-specific custom rules
# ---------------------------------------------------------------------------

[[rules]]
id = "account-number-pattern"
description = "Account number reference like 'Ending in 1234' or 'XXXXX1234'"
regex = '''(?i)(ending\s+in|account\s+(number|#|no\.?))\s*[-:]?\s*\d{4,}'''
tags = ["pii", "finance"]

[[rules]]
id = "ssn-pattern"
description = "Possible SSN"
regex = '''\b\d{3}-\d{2}-\d{4}\b'''
tags = ["pii"]

[[rules]]
id = "routing-number-pattern"
description = "Possible routing number (9 digits in finance context)"
regex = '''(?i)(routing|aba|ach)\s*[-:#]?\s*\d{9}\b'''
tags = ["finance"]

[[rules]]
id = "credit-card-pattern"
description = "Credit card number"
regex = '''\b(?:\d[ -]*?){13,16}\b'''
tags = ["pii", "finance"]

# ---------------------------------------------------------------------------
# Allowlist — patterns that look like leaks but aren't
# ---------------------------------------------------------------------------

[allowlist]
description = "Allow placeholder patterns in templates and docs"
paths = [
    '''memory-templates/.*''',
    '''examples/.*''',
    '''README\.md''',
    '''PHILOSOPHY\.md''',
]
regexes = [
    '''XXXX''',                          # placeholder
    '''ending\s+in\s+XXXX''',            # template placeholder
    '''\$X[,X]*\.?X*''',                 # dollar placeholders like $X,XXX
    '''\[.*?\]''',                       # markdown placeholders [your name]
    '''mcp__[a-fxX0-9-]+__''',           # MCP UUID-prefixed tool names (Truthifi etc.) — placeholder UUIDs in docs
]

# ---------------------------------------------------------------------------
# Per-file extra rule: catch real-looking MCP UUIDs that aren't the
# placeholder. The placeholder above (a1b2c3d4-xxxx-...) is allowlisted; any
# OTHER full UUID embedded in a tool name in docs is almost certainly a real
# session prefix that leaked from an example.
# ---------------------------------------------------------------------------

[[rules]]
id = "mcp-real-uuid-prefix"
description = "Real-looking MCP UUID prefix in docs (suggests a real Truthifi session leaked)"
regex = '''mcp__[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}__'''
tags = ["mcp", "leak"]
[rules.allowlist]
description = "The documented placeholder is the only acceptable form"
regexes = [
    '''mcp__a1b2c3d4-xxxx-xxxx-xxxx-xxxxxxxxxxxx__''',
]
